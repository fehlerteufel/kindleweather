<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="600">
  <title>Kindle Weather</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body style="width: 728px; height: 984px; border: 1px solid black; margin: 0; padding: 20px;">
  <div class="block1" style="height:auto; padding-bottom: 5px;">
    <div class="time" style="font-size:150px; float:left;">
      --:--
    </div>
    <div class="date" style="font-size:60px; float:right; text-align:right;">
      <div class="weekday"></div>
      <div class="day"></div>
    </div>
  </div>
  <div class="block2" style="height:200px; clear:both; border-top: 1px solid black; border-bottom: 1px solid black; padding-top: 5px; padding-bottom: 5px;">
    <div style="height:100%; width: 50%; float:left;">
      <span class="temperature" style="font-size:130px;">--,-</span>
      <span style="font-size: 60px; vertical-align: top;">℃</span>
    </div>
    <div style="font-size:50px; height:50%; width: 50%; float:right; text-align:right;">
      <span class="humidity" >--</span>
      <span style="font-size: 30px;">%</span>
    </div>
    <div class="minmaxtemp" style="font-size: 50px; height:50%; width:50%; float:right; text-align:right;">
      <span class="mintemp">--,-</span>
      <span style="font-size: 30px; vertical-align: top;">℃</span>
      <span> / </span>
      <span class="maxtemp">--,-</span>
      <span style="font-size: 30px; vertical-align: top;">℃</span>
    </div>
  </div>
  <!--<main class="weather" aria-live="polite">
      <section class="readings">
        <div class="reading">
          <div id="temperature" class="value">--.-</div>
          <div class="unit">C</div>
        </div>
        <div class="reading">
          <div id="humidity" class="value">--</div>
          <div class="unit">%</div>
        </div>
      </section>
      <footer id="timestamp" class="timestamp">Loading...</footer>
    </main>-->
  <!--<script src="/app.js"></script>-->

  <script>
    (function () {
      var days = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
      var months = ["Jan.", "Feb.", "März", "April", "Mai", "Juni", "Juli", "Aug.", "Sep.", "Okt.", "Nov.", "Dez."];
      var now = new Date();

      var temperatureEl = document.querySelector(".temperature");
      var humidityEl = document.querySelector(".humidity");
      var minmaxtempEl = document.querySelector(".minmaxtemp");
      var minTempEl = document.querySelector(".mintemp");
      var maxTempEl = document.querySelector(".maxtemp");
      var timestampEl = document.getElementById("timestamp");
      var lastWeatherTimestamp = null;

      function refresh() {
        now = new Date();
        document.querySelector(".time").innerHTML = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
        document.querySelector(".weekday").innerHTML = days[now.getDay()];
        document.querySelector(".day").innerHTML = now.getDate() + ". " + months[now.getMonth()];

        window.setTimeout(refresh, (60 - now.getSeconds()) * 1000 - now.getMilliseconds());

        requestWeather();
      }

      function requestWeather() {
        var tenMinutes = 10 * 60 * 1000;
        var thirtyMinutes = 30 * 60 * 1000;
        var lastWeatherDate = parseWeatherTimestamp(lastWeatherTimestamp);

        if (lastWeatherDate) {
          var weatherAge = new Date().getTime() - lastWeatherDate.getTime();

          if (weatherAge > thirtyMinutes) {
            temperatureEl.innerHTML = "--,-";
            humidityEl.innerHTML = "--";
            minmaxtempEl.innerHTML = "";
          }

          if (weatherAge <= tenMinutes) {
            return;
          }
        }

        var xhr = new XMLHttpRequest();

        xhr.open("GET", "/api/weather?t=" + new Date().getTime(), true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) {
            return;
          }

          if (xhr.status < 200 || xhr.status >= 300) {
            if (timestampEl) {
              timestampEl.innerHTML = "Update failed";
            }
            return;
          }

          try {
            var data = JSON.parse(xhr.responseText);
            lastWeatherTimestamp = data.timestamp || lastWeatherTimestamp;
            temperatureEl.innerHTML = Number(data.temperature).toFixed(1).replace(".", ",");
            humidityEl.innerHTML = Math.round(Number(data.humidity));
            minTempEl.innerHTML = data.minTemperature !== null ? Number(data.minTemperature).toFixed(1).replace(".", ",") : "--,-";
            maxTempEl.innerHTML = data.maxTemperature !== null ? Number(data.maxTemperature).toFixed(1).replace(".", ",") : "--,-";
            /*var minTemp = data.minTemperature !== null ? Number(data.minTemperature).toFixed(1) : null;
            var maxTemp = data.maxTemperature !== null ? Number(data.maxTemperature).toFixed(1) : null;
            if (minTemp !== null && maxTemp !== null) {
              minmaxtempEl.innerHTML = minTemp + "℃ / " + maxTemp + "℃";
            } else {
              minmaxtempEl.innerHTML = "";
            }*/
            if (timestampEl) {
              timestampEl.innerHTML = data.timestamp || "";
            }
          } catch (error) {
            if (timestampEl) {
              timestampEl.innerHTML = "Invalid weather data";
            }
          }
        };
        xhr.send();
      }

      function parseWeatherTimestamp(timestamp) {
        var parts;

        if (!timestamp) {
          return null;
        }

        parts = timestamp.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/);
        if (!parts) {
          return null;
        }

        return new Date(
          Number(parts[1]),
          Number(parts[2]) - 1,
          Number(parts[3]),
          Number(parts[4]),
          Number(parts[5]),
          Number(parts[6])
        );
      }

      refresh();
    })();


  </script>
</body>

</html>
